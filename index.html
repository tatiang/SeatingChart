                    cursor:'pointer',marginBottom:2,transition:'all .13s',
                    background:active?'rgba(200,149,90,.18)':'transparent',
                    border:`1px solid ${active?'rgba(200,149,90,.35)':'transparent'}`}}>
                  <div style={{width:3,height:28,borderRadius:3,marginRight:9,flexShrink:0,
                    background:active?TCOLORS[ci%TCOLORS.length]:'transparent',transition:'background .13s'}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12.5,fontWeight:600,color:active?'#f5e6c8':'#a09070',
                      whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</div>
                    <div style={{fontSize:10,color:'rgba(245,230,200,.22)',marginTop:1}}>
                      {c.students.length} students · {c.tables.length} tables
                    </div>
                  </div>
                  <button onClick={e=>{e.stopPropagation();deleteClass(c.id);}}
                    style={{border:'none',background:'none',color:'rgba(245,230,200,.18)',cursor:'pointer',
                      fontSize:15,padding:'2px 4px',lineHeight:1,flexShrink:0}}>×</button>
                </div>
              );
            })}
          </div>

          <div style={{padding:'8px 9px'}}>
            <button className="btn btn-warm" onClick={()=>setModal('newClass')}
              style={{width:'100%',justifyContent:'center',fontSize:13,padding:'8px',borderRadius:8}}>
              + New Class
            </button>
          </div>

          {cls&&cls.seatingHistory.length>0&&(
            <div style={{padding:'9px 9px 10px',borderTop:'1px solid rgba(255,255,255,.06)'}}>
              <div style={{fontSize:9.5,fontWeight:700,textTransform:'uppercase',letterSpacing:.9,
                color:'rgba(245,230,200,.28)',padding:'0 5px',marginBottom:5}}>Recent</div>
              {cls.seatingHistory.slice(0,3).map(h=>(
                <div key={h.id} style={{fontSize:10,color:'rgba(245,230,200,.35)',
                  padding:'3px 6px',borderRadius:4,marginBottom:2,background:'rgba(255,255,255,.04)'}}>
                  {fmt(h.date)}
                </div>
              ))}
              <button onClick={()=>setModal('history')}
                style={{background:'none',border:'1px solid rgba(255,255,255,.1)',
                  color:'rgba(245,230,200,.45)',borderRadius:6,padding:'5px 10px',
                  cursor:'pointer',fontSize:11,width:'100%',marginTop:4}}>
                All History ({cls.seatingHistory.length})
              </button>
            </div>
          )}

          {FB_READY&&fbUser&&(
            <div style={{padding:'8px 14px',borderTop:'1px solid rgba(255,255,255,.06)',
              display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,
                background:syncSt==='synced'?'#10b981':syncSt==='syncing'?'#f59e0b':syncSt==='error'?'#ef4444':'#64748b'}}/>
              <span style={{fontSize:10,color:'rgba(245,230,200,.3)'}}>
                {syncSt==='synced'?'Saved to cloud':syncSt==='syncing'?'Saving…':syncSt==='error'?'Save error':'Local only'}
              </span>
            </div>
          )}
        </aside>
      )}

      {/* ── Main ── */}
      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {!isFS&&(
          <div className="no-print" style={{background:'#fff',borderBottom:'1px solid #e8ddd0',
            padding:'8px 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0,
            boxShadow:'0 1px 5px rgba(139,108,66,.1)'}}>
            {cls?(
              <>
                <div style={{display:'flex',alignItems:'center',gap:7,minWidth:0}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:'#c8955a',flexShrink:0}}/>
                  <span style={{fontWeight:700,fontSize:15.5,color:'#3d2b14',
                    whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{cls.name}</span>
                  <button onClick={()=>setModal('rename')}
                    style={{border:'1px solid #e8ddd0',background:'#faf7f2',borderRadius:5,
                      cursor:'pointer',fontSize:11,padding:'2px 8px',color:'#78614a',flexShrink:0}}>✏️</button>
                </div>
                <div style={{flex:1}}/>
                {last&&<div style={{fontSize:11,color:'#94a3b8',whiteSpace:'nowrap'}}>Last: {last}</div>}
                <button className="btn btn-ghost" onClick={()=>setModal('history')} style={{fontSize:12.5}}>📅 History</button>
                <div style={{position:'relative',flexShrink:0}}>
                  <button className="btn btn-ghost" onClick={()=>setShowExport(v=>!v)}
                    style={{fontSize:12.5}}>⬆ Export</button>
                  {showExport&&(
                    <div style={{position:'absolute',top:'calc(100% + 4px)',right:0,
                      background:'#fff',border:'1px solid #e2e8f0',borderRadius:7,
                      boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:200,overflow:'hidden',minWidth:120}}>
                      {[
                        ['⬇ CSV',()=>{handleExportCSV();setShowExport(false);},(!!cls.currentAssignment)],
                        ['🖨 Print',()=>{window.print();setShowExport(false);},true],
                        ...(fbDb&&fbUser?[['🔗 Share',()=>{setModal('share');setShowExport(false);},true]]:[]),
                      ].map(([lbl,fn,enabled])=>(
                        <button key={lbl} onClick={fn} disabled={!enabled}
                          style={{display:'block',width:'100%',border:'none',background:'none',
                            cursor:enabled?'pointer':'default',fontSize:12.5,padding:'9px 14px',
                            textAlign:'left',color:enabled?'#1e293b':'#94a3b8',
                            transition:'background .1s'}}
                          onMouseEnter={e=>enabled&&(e.target.style.background='#f8f4f0')}
                          onMouseLeave={e=>e.target.style.background='none'}>{lbl}</button>
                      ))}
                    </div>
                  )}
                </div>
                <button className="btn btn-ghost" onClick={toggleFS}
                  title="Full-screen presentation mode"
                  style={{fontSize:13,padding:'8px 12px'}}>⛶ Present</button>
                <button className="btn btn-shuffle" onClick={handleShuffle}
                  style={{animation:shuffleAnim?'shufflePop .65s ease':'none'}}>
                  🔀 Shuffle!
                </button>
              </>
            ):(
              <>
                <div style={{color:'#94a3b8',fontSize:13.5,flex:1}}>← Select or create a class to get started</div>
                <button className="btn btn-ghost" onClick={toggleFS} style={{fontSize:13}}>⛶ Present</button>
              </>
            )}
          </div>
        )}

        <div style={{flex:1,overflow:'auto',
          padding:isFS?'8px':'20px',
          display:'flex',alignItems:isFS?'center':'flex-start',
          justifyContent:'center',
          background:isFS?'#0f0a05':'linear-gradient(135deg,#ede8df 0%,#e5ddd4 100%)'}}>
          <RoomDisplay/>
        </div>
      </main>

      {/* ── Right Panel ── */}
      {panelVisible&&(
        <aside className="no-print" style={{width:PANEL,background:'#fdfaf6',
          borderLeft:'1px solid #e8ddd0',display:'flex',flexDirection:'column',
          flexShrink:0,overflow:'hidden',boxShadow:'-2px 0 8px rgba(139,108,66,.08)'}}>
          <div style={{display:'flex',borderBottom:'1px solid #e8ddd0',flexShrink:0,background:'#faf7f2'}}>
            {[['students','👥','Students'],['tables','🟦','Tables'],['settings','⚙️','Settings'],['notes','📝','Notes'],['roster','🏫','Roster']].map(([tab,icon,lbl])=>(
              <button key={tab} onClick={()=>setRightTab(tab)}
                style={{flex:1,padding:'9px 3px',border:'none',cursor:'pointer',fontSize:10.5,
                  fontWeight:600,background:'transparent',transition:'all .13s',
                  color:rightTab===tab?'#c8955a':'#64748b',
                  borderBottom:`2.5px solid ${rightTab===tab?'#c8955a':'transparent'}`,
                  marginBottom:'-1px'}}>
                <div style={{fontSize:14,marginBottom:2}}>{icon}</div>{lbl}
              </button>
            ))}
          </div>
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            {rightTab==='students'&&<StudentsTab cls={cls} updateClass={updateClass} fbUser={fbUser}
              openImport={openImport} clearOpenImport={()=>setOpenImport(false)}/>}
            {rightTab==='tables'&&<TablesTab cls={cls} updateClass={updateClass}/>}
            {rightTab==='settings'&&<SettingsTab cls={cls} updateClass={updateClass}/>}
            {rightTab==='notes'&&<SchoolNotesPanel cls={cls} fbUser={fbUser}/>}
            {rightTab==='roster'&&<RosterPanel fbUser={fbUser} createClassFromRoster={createClassFromRoster}/>}
          </div>
          <div style={{padding:'9px 14px',borderTop:'1px solid #e8ddd0',background:'#faf7f2',flexShrink:0}}>
            <div style={{display:'flex'}}>
              {[[cls.students.length,'#c8955a','Students'],
                [cls.tables.length,'#10b981','Tables'],
                [cls.seatingHistory.length,'#f97316','Shuffles'],
                [cls.students.filter(s=>!cls.constraints.excludedStudents.includes(s.id)).length,'#8b5cf6','Active'],
              ].map(([v,col,lbl],i,arr)=>(
                <div key={lbl} style={{flex:1,textAlign:'center',
                  borderRight:i<arr.length-1?'1px solid #e8ddd0':'none'}}>
                  <div style={{fontSize:17,fontWeight:800,color:col,lineHeight:1.2}}>{v}</div>
                  <div style={{fontSize:9,color:'#94a3b8',textTransform:'uppercase',letterSpacing:.4,marginTop:1}}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
        </aside>
      )}

      {/* ── Fullscreen HUD ── */}
      {isFS&&(
        <div className="fs-hud no-print">
          {cls&&<span style={{color:'rgba(245,230,200,.9)',fontSize:15,fontWeight:700,marginRight:4}}>{cls.name}</span>}
          {last&&<span style={{color:'rgba(245,230,200,.4)',fontSize:11,marginRight:6}}>· Last: {last}</span>}
          {cls&&(
            <button className="btn btn-shuffle" onClick={handleShuffle}
              style={{animation:shuffleAnim?'shufflePop .65s ease':'none',fontSize:14,padding:'9px 20px'}}>
              🔀 Shuffle!
            </button>
          )}
          <button onClick={toggleFS}
            style={{border:'1px solid rgba(245,230,200,.2)',background:'rgba(255,255,255,.08)',
              color:'rgba(245,230,200,.7)',borderRadius:7,padding:'8px 14px',cursor:'pointer',
              fontSize:13,fontWeight:600}}>
            ✕ Exit
          </button>
        </div>
      )}

      {/* ── Modals ── */}
      {modal==='newClass'&&<NewClassModal onSave={createClass} onClose={()=>setModal(null)}/>}
      {modal==='rename'&&cls&&<RenameModal current={cls.name} onSave={renameClass} onClose={()=>setModal(null)}/>}
      {modal==='history'&&cls&&<HistoryModal cls={cls} onClose={()=>setModal(null)}
        onRestore={e=>updateClass(c=>({...c,currentAssignment:e.assignment}))}/>}
      {modal==='share'&&cls&&fbUser&&<ShareModal cls={cls} fbUser={fbUser} onClose={()=>setModal(null)}/>}
      {pendingImport&&<ImportModal importData={pendingImport} onImport={handleImport} onClose={()=>setPendingImport(null)}/>}

      <style>{`
        @keyframes shufflePop{
          0%{transform:scale(1) rotate(0deg)}
          25%{transform:scale(1.14) rotate(-3deg)}
          55%{transform:scale(.93) rotate(2deg)}
          80%{transform:scale(1.04) rotate(-1deg)}
          100%{transform:scale(1) rotate(0deg)}
        }
        @media print{
          .no-print{display:none!important;}
          body{overflow:visible!important;height:auto!important;background:#fff!important;}
          .print-hdr{display:block!important;}
          main{overflow:visible!important;}
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
