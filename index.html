<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── Room model ─────────────────────────────────────────────────────────────────
const BASE=20, RW=40, RH=20;
const PW=RW*BASE, PH=RH*BASE;         // 800×400 storage coord space
const SCR_W=10*BASE, SCR_H=1.2*BASE;  // 200×24

const TDIMS={sm:{w:50,h:100},md:{w:70,h:140},lg:{w:90,h:180}};
const tw=(orient,size)=>orient==='V'?TDIMS[size||'sm'].w:TDIMS[size||'sm'].h;
const th=(orient,size)=>orient==='V'?TDIMS[size||'sm'].h:TDIMS[size||'sm'].w;

// Furniture definitions
const FURN={
  plant:      {emoji:'🪴',w:34,h:34,label:'Plant'},
  clock:      {emoji:'🕐',w:30,h:30,label:'Clock'},
  door:       {emoji:'🚪',w:24,h:46,label:'Door'},
  window:     {emoji:'🪟',w:50,h:28,label:'Window'},
  sink:       {emoji:'🚰',w:30,h:30,label:'Sink'},
  teacherDesk:{emoji:null,w:90,h:50,label:"Teacher's Desk"},
};

const TCOLORS=['#3b82f6','#10b981','#f97316','#8b5cf6','#ef4444','#06b6d4','#f59e0b','#64748b'];
const TDARKS =['#1d4ed8','#059669','#c2410c','#7c3aed','#b91c1c','#0891b2','#d97706','#334155'];
const GCOLOR ={M:'#3b82f6',F:'#ec4899',NB:'#8b5cf6','':'#94a3b8',X:'#8b5cf6'};

const STORAGE='seatplan-v8';
const ROSTER_SHEET_ID='1uvuCvkcqCLXokBlRlHJTtqE6S2UpMP-mKQbuyTBaws4';
const GRADE_MAP={'kindergarten':'K','first grade':'1','second grade':'2','third grade':'3','fourth grade':'4','fifth grade':'5','sixth grade':'6'};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};
const fmt=d=>new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
const domainKey=email=>(email||'').split('@')[1]?.replace(/\./g,'_')||'unknown';
const studentKey=name=>name.toLowerCase().replace(/[^a-z0-9]/g,'_');

const FB_READY  = window.FB_READY  || false;
const fbAuth    = window.fbAuth    || null;
const fbDb      = window.fbDb      || null;
const gProvider = window.gProvider || null;

// ── Auto-layout ─────────────────────────────────────────────────────────────────
function tablePositions(n,size){
  if(!n)return[];
  const{w,h}=TDIMS[size||'sm'];
  const cols=n<=2?n:n<=4?2:n<=6?3:4;
  const rows=Math.ceil(n/cols);
  const gapX=w+30, gapY=h+30;
  const gridW=(cols-1)*gapX, gridH=(rows-1)*gapY;
  const ox=PW/2-gridW/2, oy=PH*0.46-gridH/2;
  return Array.from({length:n},(_,i)=>{
    const c=i%cols, r=Math.floor(i/cols);
    return{
      x:Math.max(12,Math.min(PW-w-12, ox+c*gapX-w/2)),
      y:Math.max(SCR_H+28,Math.min(PH-h-12, oy+r*gapY-h/2))};
  });
}

// ── Class factory ──────────────────────────────────────────────────────────────
function mkClass(name){
  const pos=tablePositions(4,'sm');
  return{id:uid(),name,students:[],tableSize:'sm',furniture:[],
    tables:pos.map((p,i)=>({id:uid(),label:`Table ${i+1}`,orientation:'V',seats:4,...p})),
    screen:{x:PW/2-SCR_W/2,y:8,orientation:'H'},
    seatingHistory:[],currentAssignment:null,
    constraints:{genderMode:'mixed',excludedStudents:[],keepApart:[],groupSize:4}};
}

// ── Assignment algorithm ───────────────────────────────────────────────────────
function generateAssignment(cls){
  const{students,tables,constraints:{genderMode,excludedStudents,keepApart}}=cls;
  if(!tables.length)return{};
  const active=students.filter(s=>!excludedStudents.includes(s.id));
  let ordered;
  if(genderMode==='together'){
    ordered=[...shuffle(active.filter(s=>s.gender==='M')),
             ...shuffle(active.filter(s=>s.gender==='F')),
             ...shuffle(active.filter(s=>s.gender!=='M'&&s.gender!=='F'))];
  }else if(genderMode==='alternating'){
    const M=shuffle(active.filter(s=>s.gender==='M'));
    const F=shuffle(active.filter(s=>s.gender==='F'));
    const X=shuffle(active.filter(s=>s.gender!=='M'&&s.gender!=='F'));
    const r=[];let mi=0,fi=0;
    while(mi<M.length||fi<F.length){if(mi<M.length)r.push(M[mi++]);if(fi<F.length)r.push(F[fi++]);}
    ordered=[...r,...X];
  }else{ordered=shuffle(active);}
  const asgn={};tables.forEach(t=>{asgn[t.id]=[];});
  ordered.forEach((s,i)=>asgn[tables[i%tables.length].id].push(s.id));
  for(let it=0;it<80;it++){
    let ok=true;
    for(const[a,b]of keepApart){
      const ta=Object.keys(asgn).find(id=>asgn[id].includes(a));
      const tb=Object.keys(asgn).find(id=>asgn[id].includes(b));
      if(ta&&tb&&ta===tb){
        ok=false;
        const others=tables.filter(t=>t.id!==ta);
        if(others.length){
          const nt=others[0|Math.random()*others.length];
          const pool=asgn[nt.id];
          if(pool.length){const si=0|Math.random()*pool.length;const sw=pool[si];
            const ai=asgn[ta].indexOf(a);asgn[ta][ai]=sw;asgn[nt.id][si]=a;}
        }
      }
    }
    if(ok)break;
  }
  return asgn;
}

// ── CSV / name parser (supports Name,Gender,PhotoURL) ─────────────────────────
function parseStudents(text){
  return text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).reduce((acc,line)=>{
    const parts=line.split(/,|\t/).map(s=>s.trim());
    const n=parts[0];
    if(!n||/^(name|student)$/i.test(n))return acc;
    const g=(parts[1]||'').toUpperCase();
    const photoURL=parts[2]||'';
    return [...acc,{id:uid(),name:n,
      gender:g==='M'?'M':g==='F'?'F':g==='NB'?'NB':'',
      photoURL, notes:''}];
  },[]);
}

// ── Chair positions (evenly distributed around table perimeter) ────────────────
function chairPositions(x,y,w,h,n){
  if(!n)return[];
  const pad=10;
  const perLong=Math.floor(n/2);
  const rem=n%2;
  const chairs=[];
  const landscape=w>=h; // top/bottom are long sides
  if(landscape){
    // top row
    for(let i=0;i<perLong;i++)chairs.push({cx:x+w*(i+1)/(perLong+1),cy:y-pad});
    // bottom row
    for(let i=0;i<perLong;i++)chairs.push({cx:x+w*(i+1)/(perLong+1),cy:y+h+pad});
    // remainder at left end
    if(rem)chairs.push({cx:x-pad,cy:y+h/2});
  }else{
    // left column
    for(let i=0;i<perLong;i++)chairs.push({cx:x-pad,cy:y+h*(i+1)/(perLong+1)});
    // right column
    for(let i=0;i<perLong;i++)chairs.push({cx:x+w+pad,cy:y+h*(i+1)/(perLong+1)});
    // remainder at top end
    if(rem)chairs.push({cx:x+w/2,cy:y-pad});
  }
  return chairs;
}

// ── Drag + click ───────────────────────────────────────────────────────────────
// Document-level listeners (most reliable, no pointer-capture quirks).
// Instant DOM manipulation for the dragged element + rAF-throttled React state
// updates so chairs/seats follow tables in real time with no snap-back.
function useDrag(cls,updateClass,toggleOrient){
  const dr=useRef(null);
  const roomRef=useRef(null);
  const clsRef=useRef(cls);
  const updateRef=useRef(updateClass);
  const toggleRef=useRef(toggleOrient);
  const rafId=useRef(0);
  useEffect(()=>{clsRef.current=cls;},[cls]);
  useEffect(()=>{updateRef.current=updateClass;},[updateClass]);
  useEffect(()=>{toggleRef.current=toggleOrient;},[toggleOrient]);

  const getScale=()=>{
    if(!roomRef.current)return 1;
    return roomRef.current.getBoundingClientRect().width/PW;
  };

  // Handlers stored in a ref so add/removeEventListener always use the same references.
  // Created once; they only access other refs, so they always read fresh values.
  const H=useRef(null);
  if(!H.current){
    const commit=()=>{
      if(!dr.current||dr.current.nx==null)return;
      const{type,id,nx,ny}=dr.current;
      const fx=Math.round(nx),fy=Math.round(ny);
      if(type==='table')
        updateRef.current(cl=>({...cl,tables:cl.tables.map(t=>t.id===id?{...t,x:fx,y:fy}:t)}));
      else if(type==='furniture')
        updateRef.current(cl=>({...cl,furniture:(cl.furniture||[]).map(fi=>fi.id===id?{...fi,x:fx,y:fy}:fi)}));
      else
        updateRef.current(cl=>({...cl,screen:{...cl.screen,x:fx,y:fy}}));
    };
    const detach=()=>{
      document.removeEventListener('pointermove',H.current.move);
      document.removeEventListener('pointerup',H.current.up);
      document.removeEventListener('pointercancel',H.current.up);
      if(rafId.current){cancelAnimationFrame(rafId.current);rafId.current=0;}
    };
    H.current={
      move:(e)=>{
        if(!dr.current)return;
        const{type,id,sx,sy,ox,oy,scale,el}=dr.current;
        const rawDx=e.clientX-sx,rawDy=e.clientY-sy;
        if(!dr.current.moved&&Math.hypot(rawDx,rawDy)<5)return;
        dr.current.moved=true;
        const dx=rawDx/scale,dy=rawDy/scale;
        const c=clsRef.current, size=c.tableSize||'sm';
        let nx,ny;
        if(type==='table'){
          const t=c.tables.find(t=>t.id===id);if(!t)return;
          nx=Math.max(0,Math.min(PW-tw(t.orientation,size),ox+dx));
          ny=Math.max(0,Math.min(PH-th(t.orientation,size),oy+dy));
        }else if(type==='furniture'){
          const f=(c.furniture||[]).find(f=>f.id===id);if(!f)return;
          const fd=FURN[f.type]||{w:34,h:34};
          nx=Math.max(0,Math.min(PW-fd.w,ox+dx));
          ny=Math.max(0,Math.min(PH-fd.h,oy+dy));
        }else{
          const sw2=c.screen.orientation==='H'?SCR_W:SCR_H;
          const sh2=c.screen.orientation==='H'?SCR_H:SCR_W;
          nx=Math.max(0,Math.min(PW-sw2,ox+dx));
          ny=Math.max(0,Math.min(PH-sh2,oy+dy));
        }
        // Instant visual feedback — move the element directly in the DOM
        if(el){el.style.left=nx+'px';el.style.top=ny+'px';}
        dr.current.nx=nx;dr.current.ny=ny;
        // rAF-throttled React state update (moves chairs/seats with tables)
        if(!rafId.current){
          rafId.current=requestAnimationFrame(()=>{
            rafId.current=0;
            commit();
          });
        }
      },
      up:(e)=>{
        if(!dr.current)return;
        detach();
        const{moved,el}=dr.current;
        if(el)el.style.cursor='';
        if(!moved){
          if(toggleRef.current)toggleRef.current(dr.current.type,dr.current.id);
        }else{
          commit();
        }
        dr.current=null;
      },
      commit,detach
    };
  }

  // Cleanup on unmount
  useEffect(()=>()=>{H.current.detach();dr.current=null;},[]);

  const onDown=useCallback((e,type,id)=>{
    e.preventDefault();
    e.stopPropagation();
    // Clean up any stuck drag
    if(dr.current){H.current.detach();if(dr.current.moved)H.current.commit();dr.current=null;}
    const c=clsRef.current;
    let ox=0,oy=0;
    if(type==='table'){const t=c.tables.find(t=>t.id===id);if(!t)return;ox=t.x;oy=t.y;}
    else if(type==='furniture'){const f=(c.furniture||[]).find(f=>f.id===id);if(!f)return;ox=f.x;oy=f.y;}
    else{ox=c.screen.x;oy=c.screen.y;}
    const el=e.currentTarget;
    dr.current={type,id,moved:false,sx:e.clientX,sy:e.clientY,ox,oy,
                scale:getScale(),el,nx:null,ny:null};
    // Attach document-level listeners — always fire regardless of pointer location
    document.addEventListener('pointermove',H.current.move);
    document.addEventListener('pointerup',H.current.up);
    document.addEventListener('pointercancel',H.current.up);
  },[]);

  return{onDown,roomRef};
}

// ── RoomCanvas ─────────────────────────────────────────────────────────────────
function RoomCanvas({cls,updateClass,historyEntry,roomScale,isFS}){
  const assignment=historyEntry?historyEntry.assignment:cls.currentAssignment;
  const readOnly=!!historyEntry;
  const size=cls.tableSize||'sm';
  const getS=id=>cls.students.find(s=>s.id===id);
  const [hovFurn,setHovFurn]=useState(null);

  const nameFontSize=size==='sm'?9:size==='md'?10.5:12.5;
  const lblFontSize=size==='sm'?8.5:size==='md'?9.5:11;

  const toggleOrient=useCallback((type,id)=>{
    if(readOnly)return;
    if(type==='table')
      updateClass(c=>({...c,tables:c.tables.map(t=>t.id===id?{...t,orientation:t.orientation==='V'?'H':'V'}:t)}));
    else if(type==='screen')
      updateClass(c=>({...c,screen:{...c.screen,orientation:c.screen.orientation==='H'?'V':'H'}}));
  },[readOnly,updateClass]);

  const deleteFurniture=useCallback((id)=>{
    updateClass(c=>({...c,furniture:(c.furniture||[]).filter(f=>f.id!==id)}));
  },[updateClass]);

  const{onDown,roomRef}=useDrag(cls,updateClass,toggleOrient);

  const scr=cls.screen;
  const scrW=scr.orientation==='H'?SCR_W:SCR_H;
  const scrH=scr.orientation==='H'?SCR_H:SCR_W;
  const furniture=cls.furniture||[];

  return(
    <div ref={roomRef}
      style={{width:PW,height:PH,position:'relative',userSelect:'none',
        touchAction:'none',
        border:'2.5px solid #8b6c42',borderRadius:6,overflow:'hidden',
        backgroundColor:'#c8955a',
        backgroundImage:[
          'repeating-linear-gradient(88deg,transparent 0px,transparent 38px,rgba(101,67,33,.06) 38px,rgba(101,67,33,.06) 40px)',
          'repeating-linear-gradient(92deg,transparent 0px,transparent 58px,rgba(101,67,33,.04) 58px,rgba(101,67,33,.04) 60px)',
          'repeating-linear-gradient(180deg,rgba(180,120,60,.12) 0px,rgba(210,155,90,.08) 40px,rgba(170,110,50,.1) 80px,rgba(200,140,75,.1) 120px)'
        ].join(','),
        boxShadow:'inset 0 0 0 5px rgba(80,50,20,.07)'}}>

      {/* inner vignette */}
      <div style={{position:'absolute',inset:0,pointerEvents:'none',
        boxShadow:'inset 0 0 30px rgba(80,50,20,.15)',borderRadius:4}}/>

      {/* room label */}
      <div style={{position:'absolute',bottom:4,right:8,fontSize:8.5,color:'rgba(255,255,255,.55)',
        background:'rgba(80,50,20,.35)',padding:'1px 7px',borderRadius:20,
        pointerEvents:'none',fontWeight:500}}>
        40′ × 20′
      </div>

      {/* Furniture items (below tables) */}
      {furniture.map(f=>{
        const fd=FURN[f.type];
        if(!fd)return null;
        const isDesk=f.type==='teacherDesk';
        return(
          <div key={f.id}
            onPointerDown={readOnly?null:(e)=>onDown(e,'furniture',f.id)}
            onMouseEnter={()=>setHovFurn(f.id)}
            onMouseLeave={()=>setHovFurn(null)}
            title={`${fd.label} — drag to move`}
            style={{position:'absolute',left:f.x,top:f.y,width:fd.w,height:fd.h,
              zIndex:3,cursor:readOnly?'default':'grab',touchAction:'none',
              display:'flex',alignItems:'center',justifyContent:'center',
              borderRadius:isDesk?5:4,
              background:isDesk?'linear-gradient(135deg,#92400e,#78350f)':'rgba(255,255,255,.18)',
              border:isDesk?'1.5px solid #451a03':'1px solid rgba(255,255,255,.3)',
              boxShadow:isDesk?'0 2px 8px rgba(0,0,0,.35)':'0 1px 4px rgba(0,0,0,.2)',
              fontSize:isDesk?10:18,fontWeight:isDesk?700:400,
              color:isDesk?'rgba(255,255,255,.9)':'inherit',
              letterSpacing:isDesk?.3:0,overflow:'hidden',textAlign:'center'}}>
            {isDesk
              ?<div style={{lineHeight:1.25,textAlign:'center'}}>
                  <div style={{fontSize:8.5,opacity:.7,textTransform:'uppercase',letterSpacing:.8}}>Teacher</div>
                  <div style={{fontSize:13}}>📋</div>
                </div>
              :fd.emoji}
            {hovFurn===f.id&&!readOnly&&(
              <button onPointerDown={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}
                onClick={()=>deleteFurniture(f.id)}
                style={{position:'absolute',top:-5,right:-5,width:14,height:14,
                  background:'#ef4444',border:'none',borderRadius:'50%',
                  cursor:'pointer',color:'#fff',fontSize:10,lineHeight:'14px',textAlign:'center',
                  padding:0,zIndex:20,boxShadow:'0 1px 3px rgba(0,0,0,.4)'}}>×</button>
            )}
          </div>
        );
      })}

      {/* Screen */}
      <div onPointerDown={readOnly?null:(e)=>onDown(e,'screen')}
        title="Click to rotate · Drag to move"
        style={{position:'absolute',left:scr.x,top:scr.y,width:scrW,height:scrH,
          background:'linear-gradient(160deg,#1e293b 0%,#0f172a 100%)',
          borderRadius:3,cursor:readOnly?'default':'pointer',zIndex:5,touchAction:'none',
          display:'flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 2px 10px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.07)'}}>
        {scr.orientation==='H'
          ?<span style={{color:'rgba(255,255,255,.9)',fontSize:9,fontWeight:800,letterSpacing:2,textTransform:'uppercase'}}>▶ SCREEN</span>
          :<div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
            {'SCREEN'.split('').map((ch,i)=>(<span key={i} style={{color:'rgba(255,255,255,.9)',fontSize:8.5,fontWeight:800,lineHeight:1.15}}>{ch}</span>))}
          </div>}
      </div>

      {/* Chair SVG overlay */}
      <svg style={{position:'absolute',inset:0,width:PW,height:PH,overflow:'visible',pointerEvents:'none',zIndex:8}}>
        {cls.tables.map(t=>{
          const W=tw(t.orientation,size), H=th(t.orientation,size);
          const chairs=chairPositions(t.x,t.y,W,H,t.seats||4);
          const ids=(assignment&&assignment[t.id])||[];
          const studs=ids.map(id=>getS(id)).filter(Boolean);
          return chairs.map((ch,ci)=>{
            const s=studs[ci];
            const col=s?(GCOLOR[s.gender]||GCOLOR['']):'#e8ddd0';
            return(<circle key={`${t.id}-c${ci}`} cx={ch.cx} cy={ch.cy} r={5.5}
              fill={col} stroke={s?'rgba(0,0,0,.18)':'rgba(139,108,66,.2)'} strokeWidth={1} opacity={s?.88:.7}/>);
          });
        })}
      </svg>

      {/* Tables */}
      {cls.tables.map((t,idx)=>{
        const W=tw(t.orientation,size), H=th(t.orientation,size);
        const isV=t.orientation==='V';
        const color=TCOLORS[idx%TCOLORS.length];
        const dark=TDARKS[idx%TDARKS.length];
        const ids=(assignment&&assignment[t.id])||[];
        const studs=ids.map(id=>getS(id)).filter(Boolean);
        const HBAR=isV?20:17;

        const dispName=s=>{
          const parts=s.name.trim().split(/\s+/);
          if(size==='sm')return parts[0]+(parts[1]?' '+parts[1][0]+'.':'');
          return s.name;
        };

        return(
          <div key={t.id} onPointerDown={readOnly?null:(e)=>onDown(e,'table',t.id)}
            title="Click to rotate · Drag to move"
            style={{position:'absolute',left:t.x,top:t.y,width:W,height:H,
              borderRadius:5,overflow:'hidden',cursor:readOnly?'default':'pointer',zIndex:10,touchAction:'none',
              boxShadow:`0 3px 14px rgba(0,0,0,.25),0 0 0 1.5px ${dark}55`}}>

            <div style={{position:'absolute',left:0,top:0,
              width:isV?W:HBAR,height:isV?HBAR:H,
              background:`linear-gradient(${isV?'180deg':'90deg'},${color},${dark})`,
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{color:'rgba(255,255,255,.95)',fontSize:lblFontSize,fontWeight:800,
                letterSpacing:.3,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',
                writingMode:isV?'horizontal-tb':'vertical-lr',textOrientation:'mixed',
                padding:isV?'0 3px':'3px 0',maxWidth:isV?W-6:undefined,maxHeight:isV?undefined:H-6}}>
                {t.label}
              </span>
            </div>

            <div style={{position:'absolute',left:isV?0:HBAR,top:isV?HBAR:0,
              width:isV?W:W-HBAR,height:isV?H-HBAR:H,
              background:'rgba(255,255,255,.92)',
              display:'flex',flexWrap:'wrap',alignContent:'flex-start',gap:2,padding:3,overflow:'hidden'}}>
              {studs.map(s=>(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:2,
                  background:'#fff',borderRadius:3,
                  borderLeft:`2.5px solid ${GCOLOR[s.gender]||GCOLOR['']}`,
                  padding:'1px 3px 1px 2px',fontSize:nameFontSize,lineHeight:1.25,color:'#1e293b',
                  maxWidth:'100%',flexShrink:0,boxShadow:'0 1px 2px rgba(0,0,0,.07)',overflow:'hidden'}}>
                  {s.photoURL&&<img src={s.photoURL} alt="" style={{width:nameFontSize+2,height:nameFontSize+2,borderRadius:'50%',objectFit:'cover',flexShrink:0}} onError={e=>e.target.style.display='none'}/>}
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{dispName(s)}</span>
                </div>
              ))}
              {!ids.length&&<span style={{color:'#d1c8b8',fontSize:nameFontSize-1,fontStyle:'italic'}}>empty</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── StudentsTab ─────────────────────────────────────────────────────────────────
function StudentsTab({cls,updateClass,openImport,clearOpenImport,fbUser}){
  const[newName,setNewName]=useState('');
  const[newGender,setNewGender]=useState('');
  const[importText,setImportText]=useState('');
  const[showImport,setShowImport]=useState(false);
  const[expanded,setExpanded]=useState(null); // student id
  const fileRef=useRef(), pasteRef=useRef();

  useEffect(()=>{
    if(openImport){setShowImport(true);clearOpenImport();setTimeout(()=>pasteRef.current?.focus(),80);}
  },[openImport]);

  const add=()=>{
    const name=newName.trim();if(!name)return;
    updateClass(c=>({...c,students:[...c.students,{id:uid(),name,gender:newGender,photoURL:'',notes:''}]}));
    setNewName('');setNewGender('');
  };
  const remove=id=>{
    const s=cls.students.find(x=>x.id===id);
    if(!window.confirm(`Remove ${s?.name||'this student'} from the class?`))return;
    updateClass(c=>({...c,
      students:c.students.filter(s=>s.id!==id),
      constraints:{...c.constraints,
        excludedStudents:c.constraints.excludedStudents.filter(x=>x!==id),
        keepApart:c.constraints.keepApart.filter(p=>!p.includes(id))}}));
  };
  const GORDER=['','M','F','NB'];
  const cycleGender=(id,cur)=>{const next=GORDER[(GORDER.indexOf(cur)+1)%GORDER.length];updateClass(c=>({...c,students:c.students.map(s=>s.id===id?{...s,gender:next}:s)}));};
  const setPhoto=(id,v)=>updateClass(c=>({...c,students:c.students.map(s=>s.id===id?{...s,photoURL:v}:s)}));
  const setNotes=(id,v,fbUser)=>{
    const entry=v.trim()?{text:v.trim(),author:fbUser?.displayName||fbUser?.email||'',date:new Date().toISOString()}:null;
    updateClass(c=>({...c,students:c.students.map(s=>s.id===id?{...s,noteMeta:entry,notes:v}:s)}));
  };

  const doImport=()=>{
    const parsed=parseStudents(importText);if(!parsed.length)return;
    const ex=new Set(cls.students.map(s=>s.name.toLowerCase()));
    updateClass(c=>({...c,students:[...c.students,...parsed.filter(s=>!ex.has(s.name.toLowerCase()))]}));
    setImportText('');setShowImport(false);
  };
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{setImportText(ev.target.result);setShowImport(true);};
    r.readAsText(f);e.target.value='';
  };

  const M=cls.students.filter(s=>s.gender==='M').length;
  const F=cls.students.filter(s=>s.gender==='F').length;
  const NB=cls.students.filter(s=>s.gender==='NB'||s.gender==='X').length;
  const active=cls.students.filter(s=>!cls.constraints.excludedStudents.includes(s.id)).length;

  const GenderPill=({value,onChange,name})=>(
    <div style={{display:'flex',flexShrink:0,borderRadius:5,overflow:'hidden',border:'1px solid #e2e8f0'}}>
      {['M','F','NB'].map((g,i)=>(
        <label key={g} style={{display:'flex',alignItems:'center',cursor:'pointer',
          padding:'2px 5px',transition:'all .1s',fontWeight:700,fontSize:10,
          color:value===g?'#fff':'#94a3b8',
          background:value===g?(g==='M'?'#3b82f6':g==='F'?'#ec4899':'#8b5cf6'):'transparent',
          borderRight:i<2?'1px solid #e2e8f0':'none'}}>
          <input type="radio" name={name} value={g} checked={value===g}
            onChange={()=>onChange(g)} style={{position:'absolute',opacity:0,width:0,height:0}}/>
          {g}
        </label>
      ))}
    </div>
  );

  return(
    <div style={{padding:'11px 13px',display:'flex',flexDirection:'column',gap:8,height:'100%',overflow:'hidden'}}>
      {/* Add one */}
      <div style={{display:'flex',gap:5}}>
        <input className="input" placeholder="Name…" value={newName}
          onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
          style={{flex:1,fontSize:13,padding:'7px 9px'}}/>
        <div style={{display:'flex',flexShrink:0,borderRadius:7,overflow:'hidden',
          border:'1.5px solid #e2e8f0',alignSelf:'stretch'}}>
          {['M','F','NB'].map((g,i)=>(
            <label key={g} style={{display:'flex',alignItems:'center',cursor:'pointer',
              padding:'0 7px',transition:'all .12s',fontWeight:700,fontSize:11.5,
              color:newGender===g?'#fff':'#94a3b8',
              background:newGender===g?(g==='M'?'#3b82f6':g==='F'?'#ec4899':'#8b5cf6'):'#fff',
              borderRight:i<2?'1px solid #e2e8f0':'none'}}>
              <input type="radio" name="newGender" value={g} checked={newGender===g}
                onChange={()=>setNewGender(g)} style={{position:'absolute',opacity:0,width:0,height:0}}/>
              {g}
            </label>
          ))}
        </div>
        <button className="btn btn-primary" onClick={add} style={{padding:'7px 12px',fontSize:13}}>Add</button>
      </div>

      {/* Import bar */}
      <div style={{display:'flex',gap:5}}>
        <button className="btn btn-ghost" onClick={()=>setShowImport(v=>!v)}
          style={{flex:1,fontSize:12,padding:'6px 8px',
            background:showImport?'#eff6ff':'#fff',color:showImport?'#2563eb':'#475569',
            borderColor:showImport?'#93c5fd':'#e2e8f0'}}>
          📋 Paste / CSV
        </button>
        <button className="btn btn-ghost" onClick={()=>fileRef.current.click()}
          style={{flex:1,fontSize:12,padding:'6px 8px'}}>📂 File</button>
        <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:'none'}} onChange={handleFile}/>
      </div>

      {showImport&&(
        <div style={{background:'#faf7f3',border:'1.5px solid #e8ddd0',borderRadius:9,
          padding:'10px',display:'flex',flexDirection:'column',gap:7}}>
          <div style={{fontSize:11,color:'#475569',fontWeight:500}}>
            One name per line, or <code style={{background:'#e8ddd0',padding:'0 3px',borderRadius:3,fontSize:10}}>Name,M/F/NB,PhotoURL</code>
          </div>
          <textarea ref={pasteRef} className="input" value={importText}
            onChange={e=>setImportText(e.target.value)} rows={5} style={{fontSize:12.5}}
            placeholder={"Alice,F,https://…\nBob,M\nSam\n…"}/>
          <div style={{display:'flex',gap:6}}>
            <button className="btn btn-success" onClick={doImport} style={{flex:1,fontSize:13}}>
              ✓ Import{importText?` (${parseStudents(importText).length})` :''}
            </button>
            <button className="btn btn-ghost" onClick={()=>{setShowImport(false);setImportText('');}}
              style={{fontSize:13,padding:'8px 12px'}}>✕</button>
          </div>
          <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5}}>
            Columns: Name · Gender (M/F/NB) · Photo URL (optional)<br/>
            Google Sheets → File → Download → CSV
          </div>
        </div>
      )}

      {/* List */}
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:2}}>
        {!cls.students.length&&(
          <div style={{textAlign:'center',color:'#94a3b8',fontSize:13,padding:'24px 0',lineHeight:1.7}}>
            No students yet.<br/>Paste a class list above.
          </div>
        )}
        {cls.students.map(s=>{
          const excl=cls.constraints.excludedStudents.includes(s.id);
          const isExp=expanded===s.id;
          const gc=GCOLOR[s.gender]||GCOLOR[''];
          const gLabel=s.gender||'·';
          const noteText=typeof s.notes==='string'?s.notes:'';
          const noteMeta=s.noteMeta||null;
          return(
            <div key={s.id} style={{borderRadius:7,border:'1px solid',
              borderColor:excl?'#fde68a':isExp?'#bfdbfe':'#e2e8f0',
              background:excl?'#fffbeb':isExp?'#f0f7ff':'#fff',
              overflow:'hidden',transition:'all .12s'}}>
              <div style={{display:'flex',alignItems:'center',gap:5,padding:'5px 8px'}}>
                {/* avatar */}
                {s.photoURL
                  ?<img src={s.photoURL} alt="" style={{width:22,height:22,borderRadius:'50%',objectFit:'cover',flexShrink:0,border:`1.5px solid ${gc}`}} onError={e=>e.target.style.display='none'}/>
                  :<div style={{width:22,height:22,borderRadius:'50%',flexShrink:0,background:gc,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:10,fontWeight:700,color:'#fff'}}>
                    {s.name[0]?.toUpperCase()||'?'}
                  </div>}
                {/* gender cycle button */}
                <button onClick={()=>cycleGender(s.id,s.gender)} title="Click to cycle gender"
                  style={{border:'none',borderRadius:4,cursor:'pointer',
                    padding:'2px 6px',fontSize:10,fontWeight:700,color:'#fff',
                    background:gc,flexShrink:0,minWidth:24,transition:'background .15s'}}>
                  {gLabel}
                </button>
                <span style={{flex:1,fontSize:13,fontWeight:500,color:'#1e293b',
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</span>
                {excl&&<span style={{fontSize:9,color:'#b45309',fontWeight:700,flexShrink:0}}>OUT</span>}
                {/* details button */}
                <button onClick={()=>setExpanded(isExp?null:s.id)} title="Edit photo & notes"
                  style={{border:'none',background:'none',color:noteText?'#c8955a':'#94a3b8',
                    cursor:'pointer',fontSize:13,lineHeight:1,padding:'0 3px',flexShrink:0}}>
                  {noteText?'✎':'⋯'}
                </button>
                <button onClick={e=>{e.stopPropagation();remove(s.id);}}
                  style={{border:'none',background:'none',color:'#cbd5e1',cursor:'pointer',
                    fontSize:16,lineHeight:1,padding:'0 2px',flexShrink:0}}>×</button>
              </div>
              {isExp&&(
                <div style={{padding:'8px 10px 10px',borderTop:'1px solid #dbeafe',
                  background:'#f8fbff',display:'flex',flexDirection:'column',gap:7}}>
                  <div>
                    <div className="section-lbl" style={{marginBottom:4}}>Photo URL</div>
                    <input className="input" placeholder="https://… (optional)"
                      value={s.photoURL||''} onChange={e=>setPhoto(s.id,e.target.value)}
                      style={{fontSize:12,padding:'6px 9px'}}/>
                  </div>
                  <div>
                    <div className="section-lbl" style={{marginBottom:4}}>My Private Notes</div>
                    <textarea className="input" placeholder="Notes visible only to you…"
                      value={noteText} onChange={e=>setNotes(s.id,e.target.value,fbUser)}
                      rows={2} style={{fontSize:12,padding:'6px 9px'}}/>
                    {noteMeta&&<div style={{fontSize:10,color:'#94a3b8',marginTop:3}}>
                      Last edited by <strong>{noteMeta.author}</strong> · {fmt(noteMeta.date)}
                    </div>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Footer */}
      <div style={{display:'flex',justifyContent:'space-between',
        fontSize:11,color:'#94a3b8',paddingTop:5,borderTop:'1px solid #f1f5f9'}}>
        <span>{cls.students.length} total</span>
        <span style={{color:'#3b82f6'}}>{M} M</span>
        <span style={{color:'#ec4899'}}>{F} F</span>
        {NB>0&&<span style={{color:'#8b5cf6'}}>{NB} NB</span>}
        <span style={{color:'#64748b'}}>{active} active</span>
      </div>
    </div>
  );
}

// ── TablesTab ─────────────────────────────────────────────────────────────────
function TablesTab({cls,updateClass}){
  const n=cls.tables.length, size=cls.tableSize||'sm';

  const setCount=cnt=>updateClass(c=>{
    const sz=c.tableSize||'sm';
    const pos=tablePositions(cnt,sz);
    const tables=pos.map((p,i)=>({
      id:c.tables[i]?.id||uid(),
      label:c.tables[i]?.label||`Table ${i+1}`,
      orientation:c.tables[i]?.orientation||'V',
      seats:c.tables[i]?.seats||4,
      ...p
    }));
    return{...c,tables};
  });

  const setSize=s=>updateClass(c=>{
    const pos=tablePositions(c.tables.length,s);
    return{...c,tableSize:s,tables:pos.map((p,i)=>({
      id:c.tables[i].id,label:c.tables[i].label,orientation:c.tables[i].orientation,seats:c.tables[i].seats||4,...p}))};
  });

  const relayout=()=>updateClass(c=>{
    const pos=tablePositions(c.tables.length,c.tableSize||'sm');
    return{...c,tables:pos.map((p,i)=>({
      id:c.tables[i].id,label:c.tables[i]?.label||`Table ${i+1}`,
      orientation:c.tables[i]?.orientation||'V',seats:c.tables[i]?.seats||4,...p}))};
  });

  const rename=(id,label)=>updateClass(c=>({...c,tables:c.tables.map(t=>t.id===id?{...t,label}:t)}));
  const toggleO=id=>updateClass(c=>({...c,tables:c.tables.map(t=>t.id===id?{...t,orientation:t.orientation==='V'?'H':'V'}:t)}));
  const setSeats=(id,s)=>updateClass(c=>({...c,tables:c.tables.map(t=>t.id===id?{...t,seats:+s}:t)}));
  const toggleScr=()=>updateClass(c=>({...c,screen:{...c.screen,orientation:c.screen.orientation==='H'?'V':'H'}}));

  const addFurniture=type=>updateClass(c=>({...c,
    furniture:[...(c.furniture||[]),{id:uid(),type,x:PW/2-FURN[type].w/2,y:PH/2-FURN[type].h/2}]}));

  return(
    <div style={{padding:'11px 13px',display:'flex',flexDirection:'column',gap:13,overflowY:'auto',height:'100%'}}>
      <div>
        <div className="section-lbl">Number of Tables</div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {[0,1,2,3,4,5,6,7,8].map(i=>(
            <button key={i} onClick={()=>setCount(i)}
              style={{width:33,height:33,border:'1.5px solid',borderRadius:7,cursor:'pointer',
                fontWeight:700,fontSize:14,transition:'all .12s',
                background:n===i?TCOLORS[Math.max(0,i-1)]:'#fff',
                borderColor:n===i?TCOLORS[Math.max(0,i-1)]:'#e2e8f0',
                color:n===i?'#fff':'#374151',
                boxShadow:n===i?`0 2px 8px ${TCOLORS[Math.max(0,i-1)]}55`:'none'}}>
              {i}
            </button>
          ))}
        </div>
      </div>

      <div>
        <div className="section-lbl">Table Size</div>
        <div style={{display:'flex',gap:6}}>
          {[['sm','S','Small','2.5×5\''],['md','M','Medium','3.5×7\''],['lg','L','Large','4.5×9\'']].map(([val,lbl,name,dims])=>(
            <button key={val} onClick={()=>setSize(val)}
              style={{flex:1,padding:'8px 5px',border:'1.5px solid',borderRadius:9,cursor:'pointer',
                textAlign:'center',transition:'all .13s',
                background:size===val?'#eff6ff':'#fff',
                borderColor:size===val?'#2563eb':'#e2e8f0',
                color:size===val?'#1d4ed8':'#475569',
                boxShadow:size===val?'0 2px 8px rgba(37,99,235,.18)':'none'}}>
              <div style={{fontSize:18,fontWeight:900,lineHeight:1}}>{lbl}</div>
              <div style={{fontSize:10,fontWeight:600,marginTop:2}}>{name}</div>
              <div style={{fontSize:9,color:'#94a3b8',marginTop:1}}>{dims}</div>
            </button>
          ))}
        </div>
      </div>

      <button className="btn btn-ghost" onClick={relayout} style={{fontSize:12.5,justifyContent:'center',padding:'7px'}}>
        ⟳ Auto-Layout Tables
      </button>

      <div>
        <div className="section-lbl">Table Labels, Orientation &amp; Seats</div>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {!cls.tables.length&&<div style={{fontSize:12,color:'#94a3b8',textAlign:'center',padding:8}}>No tables</div>}
          {cls.tables.map((t,i)=>(
            <div key={t.id} style={{display:'flex',alignItems:'center',gap:5,
              padding:'6px 10px',background:'#fff',borderRadius:8,
              border:`1.5px solid ${TCOLORS[i%TCOLORS.length]}33`,
              boxShadow:`inset 3px 0 0 ${TCOLORS[i%TCOLORS.length]}`}}>
              <input value={t.label} onChange={e=>rename(t.id,e.target.value)}
                style={{flex:1,border:'none',background:'transparent',fontSize:13,
                  fontWeight:600,color:'#1e293b',outline:'none',minWidth:0}}/>
              <button onClick={()=>toggleO(t.id)}
                style={{border:'1px solid #e2e8f0',background:'#f8fafc',borderRadius:5,
                  cursor:'pointer',fontSize:11,padding:'3px 7px',color:'#475569',fontWeight:600,flexShrink:0}}>
                {t.orientation==='V'?'↕':'↔'}
              </button>
              <select value={t.seats||4} onChange={e=>setSeats(t.id,e.target.value)}
                title="Chair count"
                style={{border:'1px solid #e2e8f0',background:'#f8fafc',borderRadius:5,
                  cursor:'pointer',fontSize:11,padding:'3px 5px',color:'#475569',fontWeight:600}}>
                {[2,3,4,5,6,7,8].map(n=><option key={n} value={n}>{n}🪑</option>)}
              </select>
            </div>
          ))}
        </div>
      </div>

      <div>
        <div className="section-lbl">Screen</div>
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',
          background:'#f8fafc',borderRadius:8,border:'1.5px solid #e2e8f0'}}>
          <span style={{fontSize:13,flex:1,fontWeight:600,color:'#334155'}}>▶ Projection Screen</span>
          <button onClick={toggleScr}
            style={{border:'1px solid #e2e8f0',background:'#fff',borderRadius:6,
              cursor:'pointer',fontSize:11.5,padding:'3px 10px',color:'#475569',fontWeight:600}}>
            {cls.screen.orientation==='H'?'↔ H':'↕ V'}
          </button>
        </div>
      </div>

      <div>
        <div className="section-lbl">Room Furniture — click to add</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
          {Object.entries(FURN).map(([type,fd])=>(
            <button key={type} onClick={()=>addFurniture(type)}
              style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,

// ── SettingsTab ────────────────────────────────────────────────────────────────
function SettingsTab({cls,updateClass}){
  const{constraints,students}=cls;
  const[kaA,setKaA]=useState('');
  const[kaB,setKaB]=useState('');

  const setGM=m=>updateClass(c=>({...c,constraints:{...c.constraints,genderMode:m}}));
  const setGS=g=>updateClass(c=>({...c,constraints:{...c.constraints,groupSize:+g}}));
  const toggleEx=id=>updateClass(c=>{
    const ex=c.constraints.excludedStudents;
    return{...c,constraints:{...c.constraints,
      excludedStudents:ex.includes(id)?ex.filter(x=>x!==id):[...ex,id]}};
  });
  const addKA=()=>{
    if(!kaA||!kaB||kaA===kaB)return;
    const pair=[kaA,kaB].sort();
    if(constraints.keepApart.some(p=>p[0]===pair[0]&&p[1]===pair[1]))return;
    updateClass(c=>({...c,constraints:{...c.constraints,keepApart:[...c.constraints.keepApart,pair]}}));
    setKaA('');setKaB('');
  };
  const rmKA=i=>updateClass(c=>({...c,constraints:{...c.constraints,
    keepApart:c.constraints.keepApart.filter((_,j)=>j!==i)}}));

  return(
    <div style={{padding:'11px 13px',display:'flex',flexDirection:'column',gap:13,overflowY:'auto',height:'100%'}}>
      <div>
        <div className="section-lbl">Seats per Table (shuffle)</div>
        <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
          {[2,3,4,5,6,7,8].map(n=>(
            <button key={n} onClick={()=>setGS(n)}
              style={{width:34,height:34,border:'1.5px solid',borderRadius:7,cursor:'pointer',
                fontWeight:700,fontSize:14,transition:'all .12s',
                background:constraints.groupSize===n?'#2563eb':'#fff',
                borderColor:constraints.groupSize===n?'#2563eb':'#e2e8f0',
                color:constraints.groupSize===n?'#fff':'#374151'}}>
              {n}
            </button>
          ))}
        </div>
      </div>

      <div>
        <div className="section-lbl">Gender Seating</div>
        {[['mixed','🔀 Random','No gender preference'],
          ['together','🟦🟧 By gender','Same gender at same tables'],
          ['alternating','⇄ Alternating','Boy–girl–boy–girl']
        ].map(([val,title,desc])=>(
          <div key={val} onClick={()=>setGM(val)}
            style={{display:'flex',alignItems:'flex-start',gap:9,cursor:'pointer',
              padding:'8px 10px',borderRadius:8,marginBottom:5,
              border:`1.5px solid ${constraints.genderMode===val?'#2563eb':'#e2e8f0'}`,
              background:constraints.genderMode===val?'#eff6ff':'#fff',transition:'all .12s'}}>
            <div style={{width:14,height:14,borderRadius:'50%',border:'2px solid',marginTop:2,flexShrink:0,
              borderColor:constraints.genderMode===val?'#2563eb':'#cbd5e1',
              background:constraints.genderMode===val?'#2563eb':'transparent',
              boxShadow:constraints.genderMode===val?'inset 0 0 0 2px #fff':'none'}}/>
            <div>
              <div style={{fontSize:12.5,fontWeight:600,color:'#1e293b'}}>{title}</div>
              <div style={{fontSize:10.5,color:'#64748b',marginTop:1}}>{desc}</div>
            </div>
          </div>
        ))}
      </div>

      <div>
        <div className="section-lbl">Keep Apart</div>
        <div style={{display:'flex',gap:5,marginBottom:6}}>
          <select value={kaA} onChange={e=>setKaA(e.target.value)}
            style={{flex:1,padding:'6px',border:'1.5px solid #e2e8f0',borderRadius:7,fontSize:12,background:'#fff',color:'#374151'}}>
            <option value="">Student A…</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select value={kaB} onChange={e=>setKaB(e.target.value)}
            style={{flex:1,padding:'6px',border:'1.5px solid #e2e8f0',borderRadius:7,fontSize:12,background:'#fff',color:'#374151'}}>
            <option value="">Student B…</option>
            {students.filter(s=>s.id!==kaA).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <button className="btn btn-primary" onClick={addKA} style={{padding:'6px 11px',fontSize:13}}>+</button>
        </div>
        {!constraints.keepApart.length&&<div style={{fontSize:11.5,color:'#94a3b8',textAlign:'center'}}>No rules set</div>}
        {constraints.keepApart.map((pair,i)=>{
          const a=students.find(s=>s.id===pair[0]),b=students.find(s=>s.id===pair[1]);
          return(
            <div key={i} style={{display:'flex',alignItems:'center',gap:7,
              padding:'6px 9px',background:'#fef2f2',borderRadius:7,border:'1px solid #fecaca',marginBottom:4}}>
              <span style={{fontSize:12,flex:1,color:'#991b1b',fontWeight:500}}>🚫 {a?.name||'?'} ↔ {b?.name||'?'}</span>
              <button onClick={()=>rmKA(i)} style={{border:'none',background:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>×</button>
            </div>
          );
        })}
      </div>

      <div>
        <div className="section-lbl">Exclude from Shuffle</div>
        <div style={{display:'flex',flexDirection:'column',gap:3,maxHeight:160,overflowY:'auto'}}>
          {!students.length&&<div style={{fontSize:12,color:'#94a3b8'}}>No students yet</div>}
          {students.map(s=>{
            const excl=constraints.excludedStudents.includes(s.id);
            return(
              <label key={s.id} style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer',
                padding:'5px 8px',borderRadius:6,
                background:excl?'#fffbeb':'#f8fafc',border:`1px solid ${excl?'#fde68a':'#e2e8f0'}`}}>
                <input type="checkbox" checked={excl} onChange={()=>toggleEx(s.id)} style={{accentColor:'#f97316'}}/>
                <span className={`tag tag-${s.gender==='X'?'NB':s.gender||'X'}`}>{s.gender||'–'}</span>
                <span style={{fontSize:12.5,color:'#1e293b',flex:1}}>{s.name}</span>
              </label>
            );
          })}
        </div>
      </div>
      <button className="btn btn-red" onClick={()=>updateClass(c=>({...c,constraints:{...c.constraints,excludedStudents:[],keepApart:[]}}))}
        style={{fontSize:12,justifyContent:'center'}}>Clear All Constraints</button>
    </div>
  );
}

// ── RosterPanel ────────────────────────────────────────────────────────────────
async function getSheetsToken(userEmail){
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.addScope('https://www.googleapis.com/auth/spreadsheets.readonly');
  if(userEmail)provider.setCustomParameters({login_hint:userEmail,hd:'markdayschool.org'});
  const result=await firebase.auth().signInWithPopup(provider);
  return result.credential?.accessToken||null;
}

async function fetchAllRosters(token){
  const BASE='https://sheets.googleapis.com/v4/spreadsheets';
  const h={Authorization:`Bearer ${token}`};
  const metaRes=await fetch(`${BASE}/${ROSTER_SHEET_ID}?fields=sheets.properties`,{headers:h});
  if(!metaRes.ok)throw new Error(`Sheets API error ${metaRes.status} — try signing in again`);
  const meta=await metaRes.json();
  const classes=[];
  for(const sheet of(meta.sheets||[])){
    const title=sheet.properties.title;
    const grade=GRADE_MAP[title.toLowerCase()];
    if(!grade)continue;
    const valRes=await fetch(`${BASE}/${ROSTER_SHEET_ID}/values/${encodeURIComponent(title)}`,{headers:h});
    if(!valRes.ok)continue;
    const{values:rows=[]}=await valRes.json();
    // Find the teacher row (first row containing a cell starting with "Teacher:")
    let teacherRowIdx=-1;
    for(let i=0;i<Math.min(rows.length,8);i++){
      if((rows[i]||[]).some(c=>c&&/^Teacher:/i.test(c))){teacherRowIdx=i;break;}
    }
    if(teacherRowIdx<0)continue;
    const teacherRow=rows[teacherRowIdx];
    const numCols=Math.max(...rows.map(r=>(r||[]).length));
    for(let col=0;col<numCols;col++){
      const teacherCell=(teacherRow[col]||'').trim();
      if(!/^Teacher:/i.test(teacherCell))continue;
      const teacherName=teacherCell.replace(/^Teacher:\s*/i,'').trim();
      const lastName=teacherName.split(' ').pop();
      const code=`${grade}${lastName[0].toUpperCase()}`;
      // Students start 2 rows after teacher row (skipping support teacher row)
      const students=[];
      for(let r=teacherRowIdx+2;r<rows.length;r++){
        const cell=((rows[r]||[])[col]||'').trim();
        if(!cell||/^bold\s*=/i.test(cell))continue;
        students.push(cell);
      }
      if(students.length>0)classes.push({code,teacher:teacherName,grade:title,students});
    }
  }
  return classes;
}

const ROSTER_CACHE='rosterCache_v1';
function RosterPanel({fbUser,createClassFromRoster}){
  const[rosters,setRosters]=useState(()=>{
    try{const c=JSON.parse(localStorage.getItem(ROSTER_CACHE)||'null');return c?.data||null;}catch{return null;}
  });
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[imported,setImported]=useState({});
  const tokenRef=useRef(null);

  const loadRosters=async()=>{
    setLoading(true);setError('');
    try{
      if(!tokenRef.current)tokenRef.current=await getSheetsToken(fbUser?.email);
      const data=await fetchAllRosters(tokenRef.current);
      setRosters(data);
      localStorage.setItem(ROSTER_CACHE,JSON.stringify({data,ts:Date.now()}));
    }catch(e){
      setError(e.message||'Failed to load. Please try again.');
      tokenRef.current=null;
    }
    setLoading(false);
  };

  const doImport=r=>{
    createClassFromRoster(r.code,r.students);
    setImported(p=>({...p,[r.code]:true}));
  };

  const gradeOrder=['K','1','2','3','4','5','6'];
  const grouped={};
  (rosters||[]).forEach(r=>{if(!grouped[r.grade])grouped[r.grade]=[];grouped[r.grade].push(r);});
  const sortedGrades=Object.keys(grouped).sort((a,b)=>{
    const gi=s=>gradeOrder.indexOf(GRADE_MAP[s.toLowerCase()]??s);
    return gi(a)-gi(b);
  });

  return(
    <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column',padding:14}}>
      <div style={{marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
        <div style={{flex:1,fontSize:11.5,fontWeight:700,color:'#5c4a32'}}>School Class Lists</div>
        <button onClick={loadRosters} disabled={loading}
          style={{fontSize:10.5,padding:'5px 12px',border:'none',borderRadius:6,cursor:'pointer',
            background:'#c8955a',color:'#fff',fontWeight:600,opacity:loading?0.7:1}}>
          {loading?'⏳ Loading…':'🔄 Refresh'}
        </button>
      </div>
      {error&&<div style={{fontSize:11,color:'#dc2626',background:'#fef2f2',
        padding:'7px 10px',borderRadius:6,marginBottom:8}}>{error}</div>}
      {!rosters&&!loading&&!error&&(
        <div style={{fontSize:12,color:'#94a3b8',textAlign:'center',paddingTop:30,lineHeight:1.7}}>
          Click <strong>Refresh</strong> to pull class lists<br/>from the school Google Sheet.<br/>
          <span style={{fontSize:10.5,color:'#c4b5a5'}}>You'll approve Sheets access once.</span>
        </div>
      )}
      {rosters&&sortedGrades.length===0&&(
        <div style={{fontSize:12,color:'#94a3b8',textAlign:'center',paddingTop:20}}>No classes found.</div>
      )}
      {sortedGrades.map(grade=>(
        <div key={grade} style={{marginBottom:10}}>
          <div style={{fontSize:10,fontWeight:700,color:'#8b6c42',textTransform:'uppercase',
            letterSpacing:1,marginBottom:4,borderBottom:'1px solid #e8ddd0',paddingBottom:2}}>{grade}</div>
          {grouped[grade].map(r=>(
            <div key={r.code} style={{display:'flex',alignItems:'center',padding:'6px 8px',
              borderRadius:6,marginBottom:3,
              background:imported[r.code]?'#f0fdf4':'#faf7f2',
              border:`1px solid ${imported[r.code]?'#86efac':'#e8ddd0'}`}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:'#374151'}}>{r.code}</div>
                <div style={{fontSize:10.5,color:'#64748b',overflow:'hidden',
                  textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.teacher} · {r.students.length} students</div>
              </div>
              {imported[r.code]
                ?<div style={{fontSize:11,color:'#16a34a',fontWeight:600,marginLeft:6}}>✓ Imported</div>
                :<button onClick={()=>doImport(r)}
                  style={{fontSize:10.5,padding:'4px 10px',border:'none',borderRadius:5,
                    cursor:'pointer',background:'#c8955a',color:'#fff',fontWeight:600,
                    flexShrink:0,marginLeft:6}}>Import</button>
              }
            </div>
          ))}
        </div>
      ))}
      {rosters&&<div style={{fontSize:10,color:'#94a3b8',textAlign:'center',marginTop:6}}>
        {rosters.length} classes · K–4 Class Lists 2025–2026
      </div>}
    </div>
  );
}

// ── ShareModal ─────────────────────────────────────────────────────────────────
function ShareModal({cls,fbUser,onClose}){
  const[code,setCode]=useState('');
  const[copied,setCopied]=useState(false);
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');
  const shareUrl=code?`${window.location.origin}${window.location.pathname}?import=${code}`:'';

  const generate=async()=>{
    setBusy(true);setErr('');
    const c=Math.random().toString(36).slice(2,8).toUpperCase();
    const payload={
      name:cls.name,students:cls.students,tables:cls.tables,
      screen:cls.screen,tableSize:cls.tableSize||'sm',
      furniture:cls.furniture||[],constraints:cls.constraints,
      createdBy:fbUser?.displayName||fbUser?.email||'Anonymous',
      createdAt:new Date().toISOString()
    };
    try{
      await fbDb.collection('sharedClasses').doc(c).set(payload);
      setCode(c);
    }catch(e){
      setErr(e.code==='permission-denied'?'Update Firestore rules to enable sharing (see README).':e.message);
    }
    setBusy(false);
  };

  const copy=()=>{
    navigator.clipboard.writeText(shareUrl).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2200);});
  };

  const mailtoHref=()=>{
    const body=encodeURIComponent(`Hi,\n\nI've shared a seating chart with you: ${cls.name}\n\nClick this link to import it:\n${shareUrl}\n\n— ${fbUser?.displayName||fbUser?.email||'Your colleague'}`);
    return`mailto:?subject=${encodeURIComponent(`Seating chart: ${cls.name}`)}&body=${body}`;
  };

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{minWidth:400}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontSize:17,fontWeight:700,color:'#0f172a'}}>🔗 Share Class</div>
          <button onClick={onClose} style={{border:'none',background:'none',fontSize:22,cursor:'pointer',color:'#94a3b8'}}>×</button>
        </div>
        <div style={{fontSize:13,color:'#475569',marginBottom:16,lineHeight:1.6}}>
          Share a snapshot of <strong>{cls.name}</strong> with another teacher. They can import it as their own class. Changes you make later won't sync.
        </div>
        {!code&&(
          <button className="btn btn-primary" onClick={generate} disabled={busy}
            style={{width:'100%',justifyContent:'center',fontSize:14,padding:'11px'}}>
            {busy?'Generating…':'✨ Generate Share Link'}
          </button>
        )}
        {err&&<div style={{marginTop:10,fontSize:12,color:'#dc2626',background:'#fef2f2',borderRadius:7,padding:'9px 12px'}}>{err}</div>}
        {code&&(
          <div style={{display:'flex',flexDirection:'column',gap:12,marginTop:4}}>
            <div style={{background:'#f0f9ff',border:'1.5px solid #bae6fd',borderRadius:9,padding:'12px 14px'}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:.8,color:'#0369a1',marginBottom:6}}>Share Code: {code}</div>
              <div style={{fontSize:12,color:'#0c4a6e',wordBreak:'break-all',lineHeight:1.5}}>{shareUrl}</div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={copy} style={{flex:1,justifyContent:'center',fontSize:13}}>
                {copied?'✓ Copied!':'📋 Copy Link'}
              </button>
              <a href={mailtoHref()} style={{flex:1,textDecoration:'none'}}>
                <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center',fontSize:13}}>
                  ✉️ Email Link
                </button>
              </a>
            </div>
            <div style={{fontSize:11,color:'#94a3b8',textAlign:'center'}}>Link includes all students, tables, and room layout.</div>
          </div>
        )}
      </div>
    </div>
  );
}

        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-success" onClick={onImport}>✓ Import as New Class</button>
        </div>
      </div>
    </div>
  );
}

// ── HistoryModal ───────────────────────────────────────────────────────────────
function HistoryModal({cls,onClose,onRestore}){
  const[viewId,setViewId]=useState(null);
  const viewing=viewId?cls.seatingHistory.find(h=>h.id===viewId):null;
  const summary=a=>cls.tables.map(t=>{
    const names=(a[t.id]||[]).map(id=>cls.students.find(s=>s.id===id)?.name||'?').join(', ');
    return`${t.label}: ${names||'empty'}`;
  }).join(' · ');

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontSize:17,fontWeight:700,color:'#0f172a'}}>📅 History — {cls.name}</div>
          <button onClick={onClose} style={{border:'none',background:'none',fontSize:22,cursor:'pointer',color:'#94a3b8'}}>×</button>
        </div>
        {!cls.seatingHistory.length&&<div style={{textAlign:'center',color:'#94a3b8',padding:'32px 0',fontSize:13}}>No history yet.</div>}
        {!viewId&&cls.seatingHistory.map(h=>(
          <div key={h.id} onClick={()=>setViewId(h.id)}
            style={{padding:'10px 13px',border:'1.5px solid #e2e8f0',borderRadius:9,marginBottom:7,
              background:'#f8fafc',cursor:'pointer'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='#2563eb'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='#e2e8f0'}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <div style={{fontWeight:700,fontSize:13,color:'#0f172a'}}>{fmt(h.date)}</div>
              <div style={{display:'flex',gap:5}}>
                <button className="btn btn-ghost" onClick={ev=>{ev.stopPropagation();setViewId(h.id);}} style={{fontSize:11,padding:'3px 9px'}}>View</button>
                <button className="btn btn-success" onClick={ev=>{ev.stopPropagation();onRestore(h);onClose();}} style={{fontSize:11,padding:'3px 9px'}}>↩ Restore</button>
              </div>
            </div>
            <div style={{fontSize:10.5,color:'#64748b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{summary(h.assignment)}</div>
          </div>
        ))}
        {viewId&&viewing&&(
          <div>
            <button className="btn btn-ghost" onClick={()=>setViewId(null)} style={{marginBottom:13,fontSize:12}}>← Back</button>
            <div style={{fontWeight:700,fontSize:14,marginBottom:12,color:'#0f172a'}}>{fmt(viewing.date)}</div>
            {cls.tables.map((t,i)=>{
              const studs=(viewing.assignment[t.id]||[]).map(id=>cls.students.find(s=>s.id===id)).filter(Boolean);
              return(
                <div key={t.id} style={{padding:'9px 12px',marginBottom:8,background:'#f8fafc',
                  border:`1.5px solid ${TCOLORS[i%TCOLORS.length]}44`,borderRadius:9,
                  boxShadow:`inset 4px 0 0 ${TCOLORS[i%TCOLORS.length]}`}}>
                  <div style={{fontWeight:700,fontSize:12,marginBottom:5,color:TCOLORS[i%TCOLORS.length]}}>{t.label}</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {!studs.length&&<span style={{fontSize:11,color:'#94a3b8'}}>Empty</span>}
                    {studs.map(s=>(
                      <span key={s.id} style={{background:'#fff',borderRadius:20,padding:'2px 9px',
                        fontSize:12,color:'#1e293b',border:'1px solid #e2e8f0',
                        borderLeft:`3px solid ${GCOLOR[s.gender]||GCOLOR['']}`}}>
                        {s.name}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
            <div style={{marginTop:14,display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setViewId(null)}>← Back</button>
              <button className="btn btn-success" onClick={()=>{onRestore(viewing);onClose();}}>↩ Restore</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>

// ── App ────────────────────────────────────────────────────────────────────────
function App(){
  const[fbUser,    setFbUser]    = useState(null);
  const[authReady, setAuthReady] = useState(!FB_READY);
  const[dataReady, setDataReady] = useState(!FB_READY);
  const[syncSt,    setSyncSt]    = useState('local');
  const saveTimer = useRef(null);
  const skipSave  = useRef(false);

  const[data,setData]=useState(()=>{
    if(FB_READY)return{classes:[],activeClassId:null};
    try{const s=localStorage.getItem(STORAGE);if(s)return JSON.parse(s);}catch(e){}
    return{classes:[],activeClassId:null};
  });
  const[rightTab,setRightTab]=useState('students');
  const[modal,setModal]=useState(null);
  const[shuffleAnim,setShuffleAnim]=useState(false);
  const[openImport,setOpenImport]=useState(false);
  const[showExport,setShowExport]=useState(false);
  const[isFS,setIsFS]=useState(false);
  const[winW,setWinW]=useState(window.innerWidth);
  const[winH,setWinH]=useState(window.innerHeight);
  const[pendingImport,setPendingImport]=useState(null);
  const importChecked=useRef(false);

  // Auth listener
  useEffect(()=>{
    if(!fbAuth)return;
    return fbAuth.onAuthStateChanged(async u=>{
      setFbUser(u);
      if(u){
        try{
          const snap=await fbDb.collection('users').doc(u.uid).get();
          if(snap.exists&&snap.data().d){skipSave.current=true;setData(snap.data().d);}
        }catch(e){console.error('Firestore load:',e);}
        setDataReady(true);
      }else{setDataReady(true);}
      setAuthReady(true);
    });
  },[]);

  // Check for ?import= on load after auth
  useEffect(()=>{
    if(!authReady||!fbUser||importChecked.current||!fbDb)return;
    const code=new URLSearchParams(window.location.search).get('import');
    if(!code)return;
    importChecked.current=true;
    fbDb.collection('sharedClasses').doc(code.toUpperCase()).get()
      .then(snap=>{if(snap.exists)setPendingImport(snap.data());})
      .catch(()=>{});
  },[authReady,fbUser]);

  // Window resize
  useEffect(()=>{
    const fn=()=>{setWinW(window.innerWidth);setWinH(window.innerHeight);};
    window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);
  },[]);

  // Fullscreen
  useEffect(()=>{
    const fn=()=>setIsFS(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange',fn);return()=>document.removeEventListener('fullscreenchange',fn);
  },[]);
  const toggleFS=()=>{
    if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen().catch(()=>{});
  };

  // Persist
  useEffect(()=>{
    if(!authReady||!dataReady)return;
    if(skipSave.current){skipSave.current=false;return;}
    if(fbDb&&fbUser){
      clearTimeout(saveTimer.current);setSyncSt('syncing');
      saveTimer.current=setTimeout(()=>{
        fbDb.collection('users').doc(fbUser.uid)
          .set({d:data,savedAt:firebase.firestore.FieldValue.serverTimestamp()})
          .then(()=>setSyncSt('synced')).catch(()=>setSyncSt('error'));
      },1200);
    }else{localStorage.setItem(STORAGE,JSON.stringify(data));}
  },[data,fbUser,authReady,dataReady]);

  const signIn  =()=>fbAuth.signInWithPopup(gProvider);
  const signOut =()=>fbAuth.signOut().then(()=>{setData({classes:[],activeClassId:null});setSyncSt('local');});

  // Layout
  const SIDEBAR=218, PANEL=290, TOOLBAR=52, PAD=28;
  const sidebarVisible=!isFS;
  const panelVisible=!isFS&&!!data.classes.find(c=>c.id===data.activeClassId);
  const availW=winW-(sidebarVisible?SIDEBAR:0)-(panelVisible?PANEL:0)-(isFS?16:PAD*2);
  const availH=winH-(isFS?0:TOOLBAR)-(isFS?60:PAD+36);
  const roomScale=Math.max(0.5,Math.min(availW/PW,availH/PH));

  const cls=data.classes.find(c=>c.id===data.activeClassId)||null;
  const updateClass=useCallback(fn=>{
    setData(prev=>({...prev,classes:prev.classes.map(c=>c.id===prev.activeClassId?fn(c):c)}));
  },[]);

  const createClass=name=>{
    const nc=mkClass(name);
    setData(prev=>({...prev,classes:[...prev.classes,nc],activeClassId:nc.id}));
    setModal(null);setRightTab('students');setOpenImport(true);
  };
  const createClassFromRoster=useCallback((code,studentNames)=>{
    const nc=mkClass(code);
    nc.students=studentNames.map(name=>({id:uid(),name,gender:'',photoURL:'',notes:''}));
    setData(prev=>({...prev,classes:[...prev.classes,nc],activeClassId:nc.id}));
    setRightTab('students');
  },[]);
  const deleteClass=id=>{
    if(!window.confirm('Delete this class and all its data?'))return;
    setData(prev=>{const rest=prev.classes.filter(c=>c.id!==id);
      return{...prev,classes:rest,activeClassId:prev.activeClassId===id?(rest[0]?.id||null):prev.activeClassId};});
  };
  const renameClass=name=>{updateClass(c=>({...c,name}));setModal(null);};

  const handleShuffle=()=>{
    if(!cls||!cls.tables.length)return;
    setShuffleAnim(true);setTimeout(()=>setShuffleAnim(false),700);
    const assignment=generateAssignment(cls);
    const entry={id:uid(),date:new Date().toISOString(),assignment};
    updateClass(c=>({...c,currentAssignment:assignment,seatingHistory:[entry,...c.seatingHistory]}));
  };

  const handleExportCSV=()=>{
    if(!cls||!cls.currentAssignment)return;
    const rows=['Table,Student,Gender'];
    cls.tables.forEach(t=>{(cls.currentAssignment[t.id]||[]).forEach(id=>{
      const s=cls.students.find(x=>x.id===id);
      if(s)rows.push(`"${t.label}","${s.name}","${s.gender}"`);
    });});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
    a.download=`${cls.name.replace(/\s+/g,'-')}-seating.csv`;a.click();
  };

  const handleImport=()=>{
    if(!pendingImport)return;
    const nc={...mkClass(pendingImport.name),
      students:(pendingImport.students||[]).map(s=>({...s,notes:s.notes||'',photoURL:s.photoURL||''})),
      tables:(pendingImport.tables||[]).map(t=>({...t,seats:t.seats||4})),
      screen:pendingImport.screen||{x:PW/2-SCR_W/2,y:8,orientation:'H'},
      tableSize:pendingImport.tableSize||'sm',
      furniture:pendingImport.furniture||[],
      constraints:pendingImport.constraints||{genderMode:'mixed',excludedStudents:[],keepApart:[],groupSize:4},
      seatingHistory:[],currentAssignment:null};
    setData(prev=>({...prev,classes:[...prev.classes,nc],activeClassId:nc.id}));
    setPendingImport(null);
    // Clean URL
    const url=new URL(window.location.href);url.searchParams.delete('import');
    window.history.replaceState({},'',url.toString());
  };

  const last=cls?.seatingHistory.length?fmt(cls.seatingHistory[0].date):null;

  if(!authReady){
    return(
      <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',
        background:'#1c1208',flexDirection:'column',gap:14}}>
        <div style={{fontSize:36}}>🪑</div>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:14}}>Loading…</div>
      </div>
    );
  }
  if(FB_READY&&!fbUser)return <SignInScreen onSignIn={signIn}/>;

  const RoomDisplay=()=>cls?(
    <div>
      <div className="print-hdr" style={{marginBottom:14}}>
        <div style={{fontSize:22,fontWeight:800,color:'#0f172a'}}>{cls.name}</div>
        <div style={{fontSize:13,color:'#64748b',marginTop:3}}>
          Seating Chart · {new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
        </div>
      </div>
      <div style={{width:PW*roomScale,height:PH*roomScale,position:'relative',flexShrink:0}}>
        <div style={{position:'absolute',top:0,left:0,width:PW,height:PH,
          transform:`scale(${roomScale})`,transformOrigin:'top left'}}>
          <RoomCanvas cls={cls} updateClass={updateClass} roomScale={roomScale} isFS={isFS}/>
        </div>
      </div>
      {!isFS&&cls.tables.length>0&&(
        <div style={{display:'flex',gap:14,marginTop:10,flexWrap:'wrap',padding:'0 2px'}}>
          {cls.tables.map((t,i)=>{
            const cnt=(cls.currentAssignment&&cls.currentAssignment[t.id]?.length)||0;
            return(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:5}}>
                <div style={{width:9,height:9,background:TCOLORS[i%TCOLORS.length],borderRadius:2}}/>
                <span style={{fontSize:11.5,color:'#64748b',fontWeight:500}}>
                  {t.label} <span style={{color:'#94a3b8'}}>({cnt})</span>
                </span>
              </div>
            );
          })}
        </div>
      )}
      {!isFS&&!cls.currentAssignment&&(
        <div style={{marginTop:10,padding:'11px 16px',background:'rgba(255,251,235,.95)',
          border:'1.5px solid #fde68a',borderRadius:9,fontSize:13,color:'#92400e',
          maxWidth:PW*roomScale,lineHeight:1.6}}>
          💡 Press <strong>🔀 Shuffle!</strong> to assign students to tables.
          <span style={{color:'#b45309'}}> Click a table to rotate. Drag to reposition.</span>
        </div>
      )}
    </div>
  ):(
    <div style={{textAlign:'center',padding:'60px 20px'}}>
      <div style={{fontSize:64,marginBottom:16}}>🪑</div>
      <div style={{fontSize:24,fontWeight:800,color:'#3d2b14',marginBottom:10}}>Seating Chart Builder</div>
      <div style={{fontSize:15,color:'#78614a',marginBottom:28,lineHeight:1.6}}>
        Create a class, add students, and hit Shuffle!
      </div>
      <button className="btn btn-primary" onClick={()=>setModal('newClass')}
        style={{fontSize:15,padding:'12px 28px',borderRadius:9}}>
        + Create Your First Class
      </button>
    </div>
  );

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>

      {/* ── Sidebar ── */}
      {sidebarVisible&&(
        <aside className="no-print" style={{width:SIDEBAR,
          background:'linear-gradient(180deg,#251e14 0%,#1c1610 100%)',
          display:'flex',flexDirection:'column',flexShrink:0,
          boxShadow:'2px 0 16px rgba(0,0,0,.28)'}}>
          <div style={{padding:'14px 14px 12px',borderBottom:'1px solid rgba(255,255,255,.07)'}}>
            <div style={{display:'flex',alignItems:'center',gap:9}}>
              <div style={{width:32,height:32,
                background:'linear-gradient(135deg,#c8955a,#8b6c42)',
                borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:17,flexShrink:0,boxShadow:'0 2px 8px rgba(139,108,66,.5)'}}>🪑</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:800,color:'#f5e6c8',letterSpacing:-.3}}>Seating Chart</div>
                <div style={{fontSize:9.5,color:'rgba(245,230,200,.3)'}}>Classroom Builder</div>
              </div>
            </div>
            {fbUser&&(
              <div style={{display:'flex',alignItems:'center',gap:7,marginTop:10,
                padding:'7px 8px',background:'rgba(255,255,255,.07)',borderRadius:8}}>
                {fbUser.photoURL&&(
                  <img src={fbUser.photoURL} alt="" referrerPolicy="no-referrer"
                    style={{width:24,height:24,borderRadius:'50%',border:'1.5px solid rgba(245,230,200,.2)',flexShrink:0}}/>
                )}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:600,color:'rgba(245,230,200,.8)',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {fbUser.displayName||fbUser.email}
                  </div>
                  <div style={{fontSize:9,color:'rgba(245,230,200,.3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {fbUser.email}
                  </div>
                </div>
                <button onClick={signOut}
                  style={{border:'1px solid rgba(245,230,200,.15)',background:'transparent',
                    color:'rgba(245,230,200,.4)',borderRadius:5,padding:'2px 6px',
                    cursor:'pointer',fontSize:10,flexShrink:0}}>
                  Sign out
                </button>
              </div>
            )}
          </div>

          <div style={{flex:1,overflowY:'auto',padding:'9px 9px 0'}}>
            <div style={{fontSize:9.5,fontWeight:700,textTransform:'uppercase',letterSpacing:.9,
              color:'rgba(245,230,200,.28)',padding:'0 5px',marginBottom:5}}>Classes</div>
            {!data.classes.length&&(
              <div style={{fontSize:12,color:'rgba(245,230,200,.2)',textAlign:'center',padding:'18px 0',lineHeight:1.7}}>

            {data.classes.map((c,ci)=>{
              const active=data.activeClassId===c.id;
